name: Build Synth IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS
        run: |
          xcodebuild build \
            -scheme Synth \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENABLE_BITCODE=NO \
            IPHONEOS_DEPLOYMENT_TARGET=15.0

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/Synth.app Payload/
          mkdir -p Symbols
          zip -r Synth.ipa Payload Symbols
          ls -lh Synth.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Synth-unsigned.ipa
          path: Synth.ipa
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "=== Synth IPA Build Complete ==="
          echo "IPA: Synth.ipa"
          echo "Available in: Artifacts"
          echo "Download and sideload via LiveContainer/StikDebug/SideStore"
