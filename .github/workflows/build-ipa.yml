name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate

      - name: Build for iOS
        run: |
          xcodebuild build \
            -scheme Synth \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENABLE_BITCODE=NO

      - name: Package unsigned IPA
        run: |
          ./scripts/package-ipa.sh build/Build/Products/Release-iphoneos Synth.ipa

      - name: Upload IPA to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Synth-unsigned.ipa
          path: Synth.ipa
          retention-days: 30

      - name: Upload to Google Drive (if credentials available)
        if: secrets.GOOGLE_DRIVE_CREDENTIALS != ''
        run: |
          # Setup rclone with Google Drive remote
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf

          # Copy IPA to remote
          rclone copy Synth.ipa gdrive:SYNTH_BUILDS/ --progress
