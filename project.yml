name: Synth
options:
  bundleIdPrefix: com.bward
  deploymentTarget:
    iOS: 15.0
  minimumXcodeGenVersion: 2.34
  useBaseInternationalization: false

targets:
  Synth:
    type: application
    platform: iOS
    sources:
      - path: App
    resources:
      - path: App/Info.plist
    dependencies:
      - target: SynthCore
      - target: SynthScripting
      - target: SynthUI
    settings:
      CODE_SIGNING_ALLOWED: "NO"
      CODE_SIGNING_REQUIRED: "NO"
      ENABLE_BITCODE: "NO"
      IPHONEOS_DEPLOYMENT_TARGET: 15.0
      INFOPLIST_FILE: App/Info.plist
    attributes:
      TargetAttributes:
        Synth:
          CreatedOnToolsVersion: 15.0

  SynthCore:
    type: framework
    platform: iOS
    sources:
      - path: Packages/SynthCore/Sources/SynthCore
    settings:
      CODE_SIGNING_ALLOWED: "NO"
      CODE_SIGNING_REQUIRED: "NO"
      ENABLE_BITCODE: "NO"
      IPHONEOS_DEPLOYMENT_TARGET: 15.0

  SynthScripting:
    type: framework
    platform: iOS
    sources:
      - path: Packages/SynthScripting/Sources/SynthScripting
    dependencies:
      - target: SynthCore
    settings:
      CODE_SIGNING_ALLOWED: "NO"
      CODE_SIGNING_REQUIRED: "NO"
      ENABLE_BITCODE: "NO"
      IPHONEOS_DEPLOYMENT_TARGET: 15.0

  SynthUI:
    type: framework
    platform: iOS
    sources:
      - path: Packages/SynthUI/Sources/SynthUI
    dependencies:
      - target: SynthCore
      - target: SynthScripting
    settings:
      CODE_SIGNING_ALLOWED: "NO"
      CODE_SIGNING_REQUIRED: "NO"
      ENABLE_BITCODE: "NO"
      IPHONEOS_DEPLOYMENT_TARGET: 15.0

  SynthTexture:
    type: framework
    platform: iOS
    sources:
      - path: Packages/SynthTexture/Sources/SynthTexture
    dependencies:
      - target: SynthCore
    settings:
      CODE_SIGNING_ALLOWED: "NO"
      CODE_SIGNING_REQUIRED: "NO"
      ENABLE_BITCODE: "NO"
      IPHONEOS_DEPLOYMENT_TARGET: 15.0

  SynthMesh:
    type: framework
    platform: iOS
    sources:
      - path: Packages/SynthMesh/Sources/SynthMesh
    dependencies:
      - target: SynthCore
    settings:
      CODE_SIGNING_ALLOWED: "NO"
      CODE_SIGNING_REQUIRED: "NO"
      ENABLE_BITCODE: "NO"
      IPHONEOS_DEPLOYMENT_TARGET: 15.0

  SynthAudio:
    type: framework
    platform: iOS
    sources:
      - path: Packages/SynthAudio/Sources/SynthAudio
    dependencies:
      - target: SynthCore
    settings:
      CODE_SIGNING_ALLOWED: "NO"
      CODE_SIGNING_REQUIRED: "NO"
      ENABLE_BITCODE: "NO"
      IPHONEOS_DEPLOYMENT_TARGET: 15.0

  SynthDocs:
    type: framework
    platform: iOS
    sources:
      - path: Packages/SynthDocs/Sources/SynthDocs
    settings:
      CODE_SIGNING_ALLOWED: "NO"
      CODE_SIGNING_REQUIRED: "NO"
      ENABLE_BITCODE: "NO"
      IPHONEOS_DEPLOYMENT_TARGET: 15.0
